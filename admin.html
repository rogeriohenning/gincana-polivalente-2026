<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Controlo da Gincana</title>

<style>
:root {
  --bg-dark: #121826;
  --bg-panel: rgba(255, 255, 255, 0.05);
  --text-main: #ffffff;
  --text-muted: #a0aab5;
  --accent: #ffd700;
  --shadow-panel: 0 8px 32px rgba(0, 0, 0, 0.3);
  --border-panel: 1px solid rgba(255, 255, 255, 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', Arial, sans-serif;
  background-color: var(--bg-dark);
  background-image: 
    radial-gradient(at 10% 10%, rgba(30, 144, 255, 0.15) 0px, transparent 50%),
    radial-gradient(at 90% 90%, rgba(255, 20, 147, 0.08) 0px, transparent 50%);
  color: var(--text-main);
  text-align: center;
  min-height: 100vh;
  padding: 20px;
}

h1 {
  font-size: 2rem;
  color: var(--accent);
  margin-bottom: 30px;
  text-transform: uppercase;
  text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
  margin-top: 20px;
}

#painel {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.card {
  background: var(--bg-panel);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 16px;
  border: var(--border-panel);
  box-shadow: var(--shadow-panel);
  padding: 25px;
  width: 280px;
  text-align: center;
}

.card h2 {
  color: var(--accent);
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 15px;
  text-transform: uppercase;
}

.card button {
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-main);
  border: 1px solid rgba(255, 255, 255, 0.05);
  padding: 12px 10px;
  margin: 5px;
  font-size: 1.1rem;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  width: 42%;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.2), -1px -1px 2px rgba(255,255,255,0.05);
}

.card button:active {
  transform: translateY(2px);
  background: rgba(255, 255, 255, 0.1);
}

.status {
  display: block;
  margin-top: 15px;
  font-size: 0.9rem;
  color: var(--accent);
  height: 20px;
}

@media (max-width: 768px) {
  h1 { font-size: 1.8rem; }
  .card { width: 100%; max-width: 350px; padding: 20px; }
  .card button { padding: 15px 5px; }
}
</style>
</head>

<body>

<h1>Controlo de Pontos</h1>
<div id="painel"></div>

<script>
  
// API
const API_URL = "https://script.google.com/macros/s/AKfycbz_0gvcm3wappagqtJORfKG8PXzHxWWKorZnnhTHAnd6N8eUp5b4dWOAGyRJmvbg71BzA/exec";

const equipes = ["Vermelho", "Azul", "Roxo", "Amarela", "Laranja", "Rosa"];

function atualizar() {
  let painel = document.getElementById("painel");
  painel.innerHTML = "";

  equipes.forEach((nome) => {
    painel.innerHTML += `
    <div class="card">
      <h2>${nome}</h2>
      <button onclick="add('${nome}', 10)">+10</button>
      <button onclick="add('${nome}', 5)">+5</button>
      <button onclick="add('${nome}', 1)">+1</button>
      <button onclick="add('${nome}', -1)">-1</button>
      <span id="status-${nome}" class="status"></span>
    </div>
    `;
  });
}

async function add(nomeEquipe, valor) {
  let statusSpan = document.getElementById(`status-${nomeEquipe}`);
  statusSpan.innerText = "⏳ A enviar...";

  try {
    await fetch(`${API_URL}?acao=add&equipe=${nomeEquipe}&pontos=${valor}`);
    statusSpan.innerText = "✅ Guardado!";
    setTimeout(() => statusSpan.innerText = "", 2000);
  } catch (erro) {
    statusSpan.innerText = "❌ Erro na rede";
  }
}

atualizar();
</script>
</body>
</html>
